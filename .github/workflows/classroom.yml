name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: test-1-1
      id: test-1-1
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: test-1-1
        setup-command: ''
        command: gcc ./code/1-1/*.c > /dev/null 2> 1-1-got.txt; cat 1-1-got.txt
        input: ''
        expected-output: |-
          .*
          .*undefined reference to `foo'
          .*
        comparison-method: regex
        timeout: 10
        max-score: 1
    - name: test-1-2
      id: test-1-2
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: test-1-2
        setup-command: gcc ./code/1-2/1-2.c -o a
        command: "./a"
        input: ''
        expected-output: |
          log: even
          log: odd
          log: even
          log: odd
          log: even
          log: odd
          log: even
          log: odd
          log: even
          log: odd
          log: even
          log: odd
          log: even
          log: odd
          log: even
          log: odd
          log: even
          log: odd
          log: even
          log: odd
          log: even
          log: odd
          log: even
          log: odd
          log: even
          log: odd
          log: even
          log: odd
          log: even
          log: odd
          log: even
          log: odd
          log: even
          log: odd
          log: even
          log: odd
          log: even
          log: odd
          log: even
          log: odd
          log: even
          log: odd
          log: even
          log: odd
          log: even
          log: odd
          log: even
          log: odd
          log: even
          log: odd
          log: even
          log: odd
          log: even
          log: odd
          log: even
          log: odd
          log: even
          log: odd
          log: even
          log: odd
          log: even
          log: odd
          log: even
          log: odd
          log: even
          log: odd
          log: even
          log: odd
          log: even
          log: odd
          log: even
          log: odd
          log: even
          log: odd
          log: even
          log: odd
          log: even
          log: odd
          log: even
          log: odd
          log: even
          log: odd
          log: even
          log: odd
          log: even
          log: odd
          log: even
          log: odd
          log: even
          log: odd
          log: even
          log: odd
          log: even
          log: odd
          log: even
          log: odd
          log: even
          log: odd
          log: even
          log: odd
        comparison-method: contains
        timeout: 10
        max-score: 1
    - name: test-1-3
      id: test-1-3
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: test-1-3
        setup-command: gcc ./code/1-3/*.c -o a
        command: "./a"
        input: ''
        expected-output: |
          log  0: task1
          log  0: task1
          log  1: task1
          log  1: task1
          log  2: task1
          log  2: task1
          log  3: task1
          log  3: task1
          log  4: task1
          log  4: task1
          log  0: task2
          log  5: task2
          log  1: task2
          log  6: task2
          log  2: task2
          log  7: task2
          log  3: task2
          log  8: task2
          log  5: task3
          log  9: task3
          log  6: task3
          log 10: task3
          log  7: task3
          log 11: task3
        comparison-method: contains
        timeout: 10
        max-score: 1
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        TEST-1-1_RESULTS: "${{steps.test-1-1.outputs.result}}"
        TEST-1-2_RESULTS: "${{steps.test-1-2.outputs.result}}"
        TEST-1-3_RESULTS: "${{steps.test-1-3.outputs.result}}"
      with:
        runners: test-1-1,test-1-2,test-1-3
